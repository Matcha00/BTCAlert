server {
    listen 127.0.0.1:8502;
    server_name btc.matcha00.xyz;

    location = /_auth {
        internal;
        proxy_pass http://unix:/run/btc-vol-alert/auth.sock:/_auth;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Cookie $http_cookie;
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /_login {
        proxy_pass http://unix:/run/btc-vol-alert/auth.sock:/_login;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location = /_logout {
        proxy_pass http://unix:/run/btc-vol-alert/auth.sock:/_logout;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location @login_redirect {
        return 302 https://$host/_login;
    }

    location / {
        auth_request /_auth;
        error_page 401 = @login_redirect;

        proxy_pass http://127.0.0.1:8503;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
        proxy_buffering off;
    }
}
